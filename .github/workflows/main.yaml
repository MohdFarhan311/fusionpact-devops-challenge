name: fp-challenge-ci-cd

on:
  push:
    branches:
      - main

jobs:

  # -----------------------------
  # 1. Build & Basic Checks
  # -----------------------------
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check backend requirements install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dummy test step
        run: echo "No tests provided for now, build and tests successful!"


  # -----------------------------
  # 2. Build & Push Docker Images
  # -----------------------------
  image-update:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend Image
      - name: Build & Push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fp-challenge-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/fp-challenge-backend:latest

      # Frontend Image
      - name: Build & Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fp-challenge-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/fp-challenge-frontend:latest


  # -----------------------------
  # 3. Deploy to AWS EC2
  # -----------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: image-update

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # pull latest code
            rm -rf fusionpact-devops-challenge
            git clone https://github.com/Saud215/fusionpact-devops-challenge.git
            cd fusionpact-devops-challenge

            # Pull latest images
            docker pull ${{ secrets.DOCKER_USERNAME }}/fp-challenge-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/fp-challenge-frontend:latest

            # Restart services
            docker compose down
            docker compose up -d
