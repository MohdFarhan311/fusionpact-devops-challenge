name: FusionPact CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_KEY: ${{ secrets.EC2_KEY }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_PASSWORD }}

    - name: Build and Push Backend Docker Image
      run: |
        docker build -t ${{ env.DOCKER_USERNAME }}/fusion-backend:latest ./backend
        docker push ${{ env.DOCKER_USERNAME }}/fusion-backend:latest

    - name: Build and Push Frontend Docker Image
      run: |
        docker build -t ${{ env.DOCKER_USERNAME }}/fusion-frontend:latest ./frontend
        docker push ${{ env.DOCKER_USERNAME }}/fusion-frontend:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ env.EC2_HOST }}
        username: ${{ env.EC2_USER }}
        key: ${{ env.EC2_KEY }}
        script: |
          cd ~/fusionpact-devops-challenge
          docker compose pull

          # Restart services
          docker compose down
          docker compose up -d     
          
