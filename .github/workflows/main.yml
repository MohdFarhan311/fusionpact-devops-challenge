name: fp-challenge-ci-cd

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install backend requirements
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dummy test step
        run: echo "Build and tests successful!"


  build-and-push-images:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend Image
      - name: Build & Push Backend Image
        run: |
          cd backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fp-challenge-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/fp-challenge-backend:latest

      # Frontend Image
      - name: Build & Push Frontend Image
        run: |
          cd frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fp-challenge-frontend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/fp-challenge-frontend:latest


  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push-images

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/fusionpact-devops-challenge || exit

            # Pull latest Docker images
            docker pull ${{ secrets.DOCKER_USERNAME }}/fp-challenge-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/fp-challenge-frontend:latest

            # Restart services
            docker compose down
            docker compose up -d
