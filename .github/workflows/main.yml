name: FusionPact CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_KEY: ${{ secrets.EC2_KEY }}

    steps:
      # -----------------------------
      # 1. Checkout code
      # -----------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Install backend dependencies (optional)
      # -----------------------------
      - name: Install Backend Requirements
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dummy Test Step
        run: echo "No tests defined yet, build and test step completed successfully!"

      # -----------------------------
      # 3. Setup Docker Buildx
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      # -----------------------------
      # 4. Build & push Docker images
      # -----------------------------
      - name: Build & Push Backend Image
        run: |
          docker buildx build --push -t ${{ env.DOCKER_USERNAME }}/fusion-backend:latest ./backend

      - name: Build & Push Frontend Image
        run: |
          docker buildx build --push -t ${{ env.DOCKER_USERNAME }}/fusion-frontend:latest ./frontend

      # -----------------------------
      # 5. Deploy to EC2
      # -----------------------------
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_KEY }}
          script: |
            cd ~/fusionpact-devops-challenge || exit 1
            docker compose pull
            docker compose down
            docker compose up -d
