version: "3.9"

services:
  frontend:
    image: fusion-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped

  backend:
    image: fusion-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data   # persist the /data folder
    restart: unless-stopped

volumes:
  backend-data:
    driver: local
